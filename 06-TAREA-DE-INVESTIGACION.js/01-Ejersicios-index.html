<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica JavaScript</title>
    <link rel="stylesheet" href="02-estilos-de-los-ejersicios.css">
</head>
<body>

    <h1>Práctica de JavaScript</h1>

    <!-- Ejercicio 1: Serie Fibonacci -->
    <div class="ejercicio">
        <h2>Ejercicio 1: Serie de Fibonacci</h2>
        <button onclick="ejercicio1()">Ingresar cantidad</button>
        <div id="res1" class="resultado"></div>
    </div>

    <!-- Ejercicio 2: Número primo -->
    <div class="ejercicio">
        <h2>Ejercicio 2: Verificar número primo</h2>
        <input type="number" id="numPrimo" placeholder="Escribe un número">
        <button onclick="ejercicio2()">Comprobar</button>
        <div id="res2" class="resultado"></div>
    </div>

    <!-- Ejercicio 3: Suma pares e impares -->
    <div class="ejercicio">
        <h2>Ejercicio 3: Suma de números pares e impares</h2>
        <button onclick="ejercicio3()">Ingresar números</button>
        <div id="res3" class="resultado"></div>
    </div>

    <!-- Ejercicio 4: Factorial -->
    <div class="ejercicio">
        <h2>Ejercicio 4: Calcular factorial</h2>
        <button onclick="ejercicio4()">Ingresar número</button>
        <div id="res4" class="resultado"></div>
    </div>

    <!-- Ejercicio 5: Adivinar número -->
    <div class="ejercicio">
        <h2>Ejercicio 5: Juego adivinar número</h2>
        <button onclick="ejercicio5()">Iniciar juego</button>
        <div id="res5" class="resultado"></div>
    </div>

    <!-- Ejercicio 6: Contar vocales -->
    <div class="ejercicio">
        <h2>Ejercicio 6: Contar vocales</h2>
        <input type="text" id="frase" placeholder="Escribe una frase">
        <button onclick="ejercicio6()">Contar</button>
        <div id="res6" class="resultado"></div>
    </div>

    <!-- Ejercicio 7: Serie 0 y 1 -->
    <div class="ejercicio">
        <h2>Ejercicio 7: Serie 0 y 1</h2>
        <button onclick="ejercicio7()">Ingresar cantidad</button>
        <div id="res7" class="resultado"></div>
    </div>

    <!-- Archivos JavaScript -->
    <script src="03-ejersicio1-main.js"></script>
    <script src="04-ejersicio2-main.js"></script>
    <script src="05-ejersicio3-main.js"></script>
    <script src="06-ejersicio4-main.js"></script>
    <script src="07-ejersicio5-main.js"></script>
    <script src="08-ejersicio6-main.js"></script>
    <script src="09-ejersicio7-main.js"></script>

</body>
</html>
